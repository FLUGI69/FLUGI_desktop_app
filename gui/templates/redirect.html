<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: url('https://images.unsplash.com/photo-1734193503455-fd7a64d8c962?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .overlay-text {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 80px;
      font-weight: bold;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
      z-index: 10;
    }

    .card {
      background: linear-gradient(135deg, #4e4949 0%, #6e6e6e 100%);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
      padding: 40px 60px;
      text-align: center;
      max-width: 90%;
      width: 400px;
      z-index: 1;
    }

    .card h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      color: #fff;
      font-weight: bold;
    }

    .card p {
      margin: 0;
      font-size: 1.2rem;
      color: #fff;
    }

    @media (max-width: 500px) {
      .card {
        padding: 30px 20px;
      }

      .card h1 {
        font-size: 1.5rem;
      }

      .card p {
        font-size: 1rem;
      }

      .overlay-text {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay-text">Example Company Ltd.</div>
  <div class="card">
    <h1>Authentication completed!</h1>
    <p>You can now close this window.</p>
  </div>
</body>

</html>
